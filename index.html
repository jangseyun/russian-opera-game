<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러시아 오페라 픽셀 스토리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
@font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); font-weight: normal; font-style: normal; }

* { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
:root {
  --gold: #f0c040; --gold-dim: #b08c30; --white: #fff5e0; --accent: #e85c3a;
  --dialogue-bg: #0f0622; --text-main: #fff5e0; --text-sub: #ddd0f0;
  --fp: 'DungGeunMo', monospace;
  --fk: 'DungGeunMo', monospace;
}
body { background:#06030f; display:flex; justify-content:center; padding:20px 0; min-height:100vh; }

#game {
  font-family: var(--fp); background:#0d0820; width:100%; max-width:860px; margin:0 auto;
  border:4px solid var(--gold);
  box-shadow:0 0 0 2px #0d0820, 0 0 0 8px #8b6914, 0 0 40px #f0c04030;
  position:relative; overflow:hidden;
}

/* TITLE */
#title-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:580px; padding:2.5rem 2rem; background:#0d0820; position:relative;
}
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%}

.title-badge { font-size:11px; color:var(--gold); letter-spacing:5px; margin-bottom:1.8rem; font-family:var(--fp); }
.game-title  {
  font-size:32px; color:var(--white); text-align:center; line-height:1.5;
  font-family:'Press Start 2P',monospace !important;
  text-shadow:4px 4px 0 #8b1a1a,8px 8px 0 #3a0000,0 0 30px #f0c04070;
  margin-bottom:.5rem; font-family:var(--fp);
}
.game-subtitle { font-size:11px; color:var(--gold); letter-spacing:3px; margin-bottom:3rem; font-family:var(--fp); }

.opera-select { display:flex; flex-direction:column; gap:12px; width:100%; max-width:520px; margin-bottom:2.5rem; }
.opera-btn {
  background:#1a0d38; border:2px solid #7a6040; color:var(--white);
  font-family:var(--fk); font-size:15px; padding:16px 20px; cursor:pointer;
  display:flex; align-items:center; gap:16px; transition:.15s;
}
.opera-btn:hover,.opera-btn.selected { background:#2e1800; border-color:var(--gold); box-shadow:0 0 12px #f0c04040; }
.opera-icon { font-size:28px; width:40px; text-align:center; flex-shrink:0; }
.opera-info { flex:1; }
.opera-name { font-size:16px; margin-bottom:6px; color:var(--white); font-family:var(--fk); font-weight:bold; }
.opera-year { font-size:12px; color:#d4b060; font-family:var(--fk); }

.play-btn {
  background:#5a0a0a; border:3px solid var(--accent); color:var(--white);
  font-family:var(--fp); font-size:13px; padding:18px 48px; cursor:pointer; letter-spacing:2px; transition:.15s;
}
.play-btn:hover { background:var(--accent); box-shadow:0 0 20px #e85c3a80; }

/* TOP NAV */
.top-nav {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 18px; border-bottom:2px solid #3a2a50; background:#080412;
}
.top-nav-title { color:var(--gold); font-size:10px; letter-spacing:1px; font-family:var(--fp); }
.top-nav-btns { display:flex; gap:8px; }
.top-nav-btn {
  background:transparent; border:1px solid #7a6a8c; color:#c8b8e0;
  font-family:var(--fk); font-size:13px; padding:6px 14px; cursor:pointer; transition:.15s;
}
.top-nav-btn:hover,.top-nav-btn.active { border-color:var(--gold); color:var(--gold); }

/* GAME SCREEN */
#game-screen { display:none; flex-direction:column; min-height:580px; }
.scene-area { position:relative; height:300px; overflow:hidden; border-bottom:2px solid #3a2a50; }
.scene-svg  { width:100%; height:100%; }
.chapter-badge {
  position:absolute; top:10px; left:14px; background:#000000cc;
  border:2px solid var(--gold); color:var(--gold); font-family:var(--fp);
  font-size:9px; padding:6px 12px; z-index:10; letter-spacing:2px;
}
.progress-bar-wrap { height:6px; background:#1a0a2e; }
.progress-bar { height:6px; background:var(--gold); transition:width .4s; box-shadow:0 0 8px #f0c040; }

.info-panel { background:#100830; border-left:4px solid var(--gold); padding:12px 18px; margin:12px 16px 0; border-radius:0 4px 4px 0; }
.info-label { font-size:9px; color:var(--gold); letter-spacing:1px; margin-bottom:8px; font-family:var(--fp); }
.info-text  { font-size:14px; color:#e8d8ff; line-height:1.8; font-family:var(--fk); }

.speaker-name {
  display:inline-block; background:#0d0820; border:2px solid var(--gold);
  color:var(--gold); font-family:var(--fk); font-size:15px; font-weight:bold;
  padding:6px 18px; margin:12px 16px 0;
}
.dialogue-box {
  background:var(--dialogue-bg); border:2px solid #3a2a60; border-top:none;
  padding:18px 22px 16px; min-height:100px; margin:0 16px; cursor:pointer;
}
.dialogue-text { color:var(--text-main); font-size:15px; line-height:2.1; font-family:var(--fk); }
.cursor-blink {
  display:inline-block; width:10px; height:15px; background:var(--white);
  animation:blink .7s step-end infinite; vertical-align:middle; margin-left:2px;
}
@keyframes blink{50%{opacity:0}}

.bottom-ui { padding:12px 16px 18px; display:flex; flex-direction:column; gap:10px; }
.nav-row   { display:flex; gap:8px; justify-content:flex-end; }
.nav-btn {
  background:#1a0a30; border:2px solid var(--gold); color:var(--gold);
  font-family:var(--fp); font-size:9px; padding:10px 20px; cursor:pointer; letter-spacing:1px; transition:.15s;
}
.nav-btn:hover { background:var(--gold); color:#0d0820; }

.choices { display:flex; flex-direction:column; gap:8px; }
.choice-btn {
  background:#140930; border:2px solid #7a6aaa; color:var(--white);
  font-family:var(--fk); font-size:14px; padding:14px 18px; cursor:pointer;
  text-align:left; line-height:1.6; transition:.15s;
}
.choice-btn:hover { border-color:var(--gold); background:#1e0e40; box-shadow:0 0 10px #f0c04030; }

/* REL VIEW */
#rel-view { display:none; padding:16px; background:#080514; }
.rel-title { color:var(--gold); font-size:11px; text-align:center; margin-bottom:16px; letter-spacing:2px; font-family:var(--fp); }
#rel-svg { display:block; margin:0 auto; }

/* END */
#end-screen {
  display:none; flex-direction:column; align-items:center; justify-content:center;
  min-height:580px; padding:2.5rem; background:#0d0820; text-align:center;
}
.end-title { color:var(--gold); font-size:16px; margin-bottom:2rem; line-height:2; text-shadow:3px 3px 0 #4a2a00; font-family:var(--fp); }
.end-text  { color:var(--text-sub); font-size:15px; line-height:2.2; max-width:500px; margin-bottom:2rem; font-family:var(--fk); }
.restart-btn {
  background:transparent; border:2px solid var(--gold); color:var(--gold);
  font-family:var(--fp); font-size:10px; padding:14px 28px; cursor:pointer; margin:6px 4px; transition:.15s;
}
.restart-btn:hover { background:var(--gold); color:#0d0820; }
</style>
</head>
<body>
<div id="game">

<div id="title-screen">
  <div class="stars" id="stars"></div>
  <div class="title-badge">✦ КЛАССИКА ✦</div>
  <div class="game-title">РУССКАЯ<br>ОПЕРА</div>
  <div class="game-subtitle">— PIXEL STORY —</div>
  <div class="opera-select">
    <button class="opera-btn selected" onclick="selectOpera('onegin',this)">
      <span class="opera-icon">🎭</span>
      <span class="opera-info"><div class="opera-name">예브게니 오네긴</div><div class="opera-year">Евгений Онегин · 차이콥스키 · 1879</div></span>
    </button>
    <button class="opera-btn" onclick="selectOpera('boris',this)">
      <span class="opera-icon">👑</span>
      <span class="opera-info"><div class="opera-name">보리스 고두노프</div><div class="opera-year">Борис Годунов · 무소륵스키 · 1874</div></span>
    </button>
    <button class="opera-btn" onclick="selectOpera('swan',this)">
      <span class="opera-icon">🦢</span>
      <span class="opera-info"><div class="opera-name">백조의 호수</div><div class="opera-year">Лебединое озеро · 차이콥스키 · 1877</div></span>
    </button>
  </div>
  <button class="play-btn" onclick="startGame()">▶ 시작하기</button>
</div>

<div id="game-screen">
  <div class="top-nav">
    <span class="top-nav-title" id="top-opera-name">예브게니 오네긴</span>
    <div class="top-nav-btns">
      <button class="top-nav-btn active" id="btn-story" onclick="showView('story')">스토리</button>
      <button class="top-nav-btn" id="btn-rel" onclick="showView('rel')">관계도</button>
      <button class="top-nav-btn" onclick="backToTitle()">◀ 나가기</button>
    </div>
  </div>
  <div id="story-view">
    <div class="scene-area">
      <div class="chapter-badge" id="chapter-badge">ACT 1</div>
      <svg class="scene-svg" id="scene-svg" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:5%"></div></div>
    <div id="info-container"></div>
    <div class="speaker-name" id="speaker-name">나레이터</div>
    <div class="dialogue-box" onclick="skipTyping()">
      <div class="dialogue-text" id="dialogue-text"></div>
    </div>
    <div class="bottom-ui">
      <div class="choices" id="choices" style="display:none"></div>
      <div class="nav-row" id="nav-row"><button class="nav-btn" onclick="nextScene()">다음 ▶</button></div>
    </div>
  </div>
  <div id="rel-view">
    <div class="rel-title" id="rel-title">등장인물 관계도</div>
    <svg id="rel-svg" viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" width="100%"></svg>
  </div>
</div>

<div id="end-screen">
  <div class="end-title" id="end-title">THE END</div>
  <div class="end-text" id="end-text"></div>
  <button class="restart-btn" onclick="backToTitle()">◀ 처음으로</button>
  <button class="restart-btn" onclick="restartCurrent()">↺ 다시 플레이</button>
</div>
</div>

const BG = {};
Object.keys(BG_SVG).forEach(k=>{ BG[k]=svg=>{ svg.innerHTML=BG_SVG[k]; }; });

// Scene-specific animated overlay additions (weather, mood effects)
function addSceneOverlay(svgEl, bgKey, act){
  const ns='http://www.w3.org/2000/svg';
  // Snow for kremlin/winter scenes
  if(bgKey==='kremlin'||bgKey==='duel'){
    for(let i=0;i<18;i++){
      const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',Math.random()*860|0);
      c.setAttribute('cy',Math.random()*300|0);
      c.setAttribute('r',Math.random()>0.6?2:1);
      c.setAttribute('fill','#e0e8ff');
      c.setAttribute('opacity',(0.2+Math.random()*0.4).toFixed(2));
      svgEl.appendChild(c);
    }
  }
  // Mist on lake
  if(bgKey==='lake'){
    const mist=document.createElementNS(ns,'ellipse');
    mist.setAttribute('cx','430'); mist.setAttribute('cy','182');
    mist.setAttribute('rx','280'); mist.setAttribute('ry','18');
    mist.setAttribute('fill','#c8e0ff'); mist.setAttribute('opacity','0.08');
    svgEl.appendChild(mist);
  }
}

  const LAYOUTS = {
    onegin: {
      onegin:  {x:430, y:100}, tatyana: {x:200, y:220},
      lensky:  {x:660, y:220}, olga:    {x:530, y:340}, gremin:  {x:310, y:340}
    },
    boris: {
      boris:   {x:430, y:90},  dmitry:  {x:160, y:220},
      grigory: {x:700, y:220}, pimen:   {x:200, y:360}, marina:  {x:660, y:360}
    },
    swan: {
      odette:    {x:260, y:160}, siegfried: {x:570, y:160},
      rothbart:  {x:260, y:360}, odile:     {x:570, y:360}
    },
  };

  // 캐릭터 위치 설정
  const layout = LAYOUTS[currentOpera] || {};
  chars.forEach((c,i) => {
    if (layout[c.id]) {
      pos[c.id] = layout[c.id];
    } else {
      const cx=410, cy=250, r=160;
      pos[c.id] = {
        x: cx + r*Math.cos(2*Math.PI*i/chars.length - Math.PI/2),
        y: cy + r*Math.sin(2*Math.PI*i/chars.length - Math.PI/2)
      };
    }
  });

  // 픽셀 아트 캐릭터 그리기 함수
  function pixelChar(x, y, color, hairColor, name, hatType) {
    let s = '';
    const px = Math.round(x), py = Math.round(y);

    // 그림자
    s += `<ellipse cx="${px+1}" cy="${py+66}" rx="22" ry="5" fill="#000000" opacity="0.2"/>`;

    // 몸통 (픽셀 블록)
    s += `<rect x="${px-10}" y="${py+20}" width="22" height="28" fill="${color}"/>`;
    // 옷 하이라이트
    s += `<rect x="${px-10}" y="${py+20}" width="6" height="28" fill="#ffffff" opacity="0.08"/>`;
    // 옷 라인 디테일
    s += `<rect x="${px-10}" y="${py+28}" width="22" height="2" fill="#000000" opacity="0.15"/>`;

    // 팔 (양쪽)
    s += `<rect x="${px-18}" y="${py+22}" width="8" height="18" fill="${color}"/>`;
    s += `<rect x="${px+12}" y="${py+22}" width="8" height="18" fill="${color}"/>`;
    // 손
    s += `<rect x="${px-18}" y="${py+38}" width="8" height="6" fill="#f0c890"/>`;
    s += `<rect x="${px+12}" y="${py+38}" width="8" height="6" fill="#f0c890"/>`;

    // 다리
    s += `<rect x="${px-8}" y="${py+48}" width="9" height="18" fill="${color}" opacity="0.85"/>`;
    s += `<rect x="${px+1}" y="${py+48}" width="9" height="18" fill="${color}" opacity="0.75"/>`;
    // 부츠
    s += `<rect x="${px-10}" y="${py+62}" width="11" height="6" fill="#2a1010"/>`;
    s += `<rect x="${px+1}" y="${py+62}" width="11" height="6" fill="#1a0808"/>`;

    // 얼굴 (8x8 픽셀)
    s += `<rect x="${px-8}" y="${py}" width="18" height="20" fill="#f0c890"/>`;
    // 머리카락
    s += `<rect x="${px-8}" y="${py}" width="18" height="6" fill="${hairColor}"/>`;
    s += `<rect x="${px-8}" y="${py+4}" width="3" height="10" fill="${hairColor}"/>`;
    s += `<rect x="${px+7}" y="${py+4}" width="3" height="10" fill="${hairColor}"/>`;
    // 눈 (픽셀)
    s += `<rect x="${px-4}" y="${py+8}" width="4" height="4" fill="#1a0a08"/>`;
    s += `<rect x="${px+2}" y="${py+8}" width="4" height="4" fill="#1a0a08"/>`;
    s += `<rect x="${px-3}" y="${py+8}" width="2" height="2" fill="#ffffff"/>`;
    s += `<rect x="${px+3}" y="${py+8}" width="2" height="2" fill="#ffffff"/>`;
    // 입
    s += `<rect x="${px-2}" y="${py+15}" width="6" height="2" fill="#c07060"/>`;

    // 모자/머리장식
    if (hatType === 'tophat') {
      s += `<rect x="${px-10}" y="${py-14}" width="22" height="16" fill="#0a0a18"/>`;
      s += `<rect x="${px-13}" y="${py-1}" width="28" height="4" fill="#0a0a18"/>`;
      s += `<rect x="${px-10}" y="${py-14}" width="22" height="3" fill="#2a2a3a"/>`;
    } else if (hatType === 'bonnet') {
      s += `<ellipse cx="${px+1}" cy="${py-4}" rx="13" ry="9" fill="${hairColor}" opacity="0.7"/>`;
      s += `<rect x="${px-12}" y="${py+1}" width="26" height="5" fill="${hairColor}" opacity="0.7"/>`;
    } else if (hatType === 'crown') {
      s += `<rect x="${px-8}" y="${py-10}" width="18" height="10" fill="#c89020"/>`;
      s += `<polygon points="${px-8},${py-8} ${px-4},${py-18} ${px},${py-8}" fill="#c89020"/>`;
      s += `<polygon points="${px},${py-8} ${px+4},${py-18} ${px+8},${py-8}" fill="#c89020"/>`;
      s += `<circle cx="${px-4}" cy="${py-19}" r="3" fill="#e84040"/>`;
      s += `<circle cx="${px+4}" cy="${py-19}" r="3" fill="#e84040"/>`;
    } else if (hatType === 'hood') {
      s += `<ellipse cx="${px+1}" cy="${py}" rx="14" ry="9" fill="#0e0c1a"/>`;
      s += `<rect x="${px-12}" y="${py}" width="26" height="10" fill="#0e0c1a"/>`;
    } else if (hatType === 'kokoshnik') {
      s += `<ellipse cx="${px+1}" cy="${py-8}" rx="15" ry="11" fill="${color}" opacity="0.9"/>`;
      s += `<rect x="${px-13}" y="${py-2}" width="28" height="6" fill="${color}" opacity="0.9"/>`;
      for (let di=0; di<5; di++) s += `<circle cx="${px-8+di*4}" cy="${py-14}" r="2" fill="#ffd040" opacity="0.8"/>`;
    }

    return s;
  }

  // 캐릭터 설정 (오페라별)
  const CHAR_STYLES = {
    onegin:    {color:'#1a2a6e', hair:'#1a1010', hat:'tophat'},
    tatyana:   {color:'#7a3a6a', hair:'#3a1c0c', hat:'bonnet'},
    lensky:    {color:'#1a3a1a', hair:'#8a5020', hat:'tophat'},
    olga:      {color:'#c0405a', hair:'#c06020', hat:'bonnet'},
    gremin:    {color:'#3a3a5a', hair:'#888080', hat:'tophat'},
    boris:     {color:'#6a0808', hair:'#2a1808', hat:'crown'},
    dmitry:    {color:'#c09020', hair:'#3a2010', hat:'tophat'},
    grigory:   {color:'#1a3a6e', hair:'#4a2810', hat:'tophat'},
    pimen:     {color:'#2a1a3a', hair:'#c0c0c0', hat:'hood'},
    marina:    {color:'#5a1a7a', hair:'#1a0a40', hat:'kokoshnik'},
    odette:    {color:'#9090c0', hair:'#c0c8e0', hat:'bonnet'},
    siegfried: {color:'#1a3a8a', hair:'#3a1c08', hat:'crown'},
    rothbart:  {color:'#0a0410', hair:'#080408', hat:null},
    odile:     {color:'#0c040c', hair:'#060408', hat:null},
  };

  const W2 = 820, H2 = 480;
  let out = `<rect width="${W2}" height="${H2}" fill="#06030f"/>`;

  // 픽셀 그리드 배경
  for (let gx=0; gx<W2; gx+=16) {
    for (let gy=0; gy<H2; gy+=16) {
      if ((gx/16 + gy/16)%2===0)
        out += `<rect x="${gx}" y="${gy}" width="16" height="16" fill="#080412" opacity="0.5"/>`;
    }
  }

  // 별들
  const starSeed = [17,43,89,127,211,307,401,503,601,709,811,907];
  starSeed.forEach((s2,i) => {
    const sx = (s2*37)%W2, sy = (s2*19)%H2;
    const sz = i%3===0?3:2;
    const sc = ['#ffffff','#ffe8d0','#d0e0ff'][i%3];
    out += `<rect x="${sx}" y="${sy}" width="${sz}" height="${sz}" fill="${sc}" opacity="${0.3+i%5*0.1}"/>`;
  });

  // 테두리 (픽셀 아트 프레임)
  out += `<rect x="0" y="0" width="${W2}" height="${H2}" fill="none" stroke="#f0c040" stroke-width="4"/>`;
  out += `<rect x="4" y="4" width="${W2-8}" height="${H2-8}" fill="none" stroke="#8a6010" stroke-width="2" opacity="0.5"/>`;
  // 모서리 픽셀 장식
  [[0,0],[W2-16,0],[0,H2-16],[W2-16,H2-16]].forEach(([cx2,cy2]) => {
    out += `<rect x="${cx2}" y="${cy2}" width="16" height="16" fill="#f0c040"/>`;
    out += `<rect x="${cx2+4}" y="${cy2+4}" width="8" height="8" fill="#06030f"/>`;
    out += `<rect x="${cx2+6}" y="${cy2+6}" width="4" height="4" fill="#f0c040"/>`;
  });

  // 관계선 먼저 (캐릭터 아래에)
  rels.forEach(r => {
    const f = pos[r.from], t = pos[r.to];
    if (!f || !t) return;
    const color = r.type==='love' ? '#e8507a' : r.type==='conflict' ? '#e04020' : '#8060c0';
    const dash = r.type==='neutral' ? '8,5' : r.type==='conflict' ? '10,5' : '';
    const w = r.type==='love' ? 3 : 2;

    // 픽셀 스타일 선 (계단형)
    out += `<line x1="${f.x|0}" y1="${f.y|0}" x2="${t.x|0}" y2="${t.y|0}" stroke="${color}" stroke-width="${w}" stroke-dasharray="${dash}" opacity="0.75"/>`;

    // 화살표 방향 표시
    const mx = ((f.x+t.x)/2)|0, my = ((f.y+t.y)/2)|0;
    const angle = Math.atan2(t.y-f.y, t.x-f.x);
    const ax = mx + 10*Math.cos(angle), ay = my + 10*Math.sin(angle);
    const a1x = ax - 6*Math.cos(angle-0.5), a1y = ay - 6*Math.sin(angle-0.5);
    const a2x = ax - 6*Math.cos(angle+0.5), a2y = ay - 6*Math.sin(angle+0.5);
    out += `<polygon points="${ax|0},${ay|0} ${a1x|0},${a1y|0} ${a2x|0},${a2y|0}" fill="${color}" opacity="0.8"/>`;

    // 관계 라벨 (픽셀 박스)
    const lbl = r.label;
    const lw = lbl.length * 10 + 16;
    out += `<rect x="${(mx-lw/2)|0}" y="${my-14}" width="${lw}" height="18" fill="#06030f" stroke="${color}" stroke-width="1"/>`;
    out += `<rect x="${(mx-lw/2+1)|0}" y="${my-13}" width="${lw-2}" height="16" fill="${color}" opacity="0.1"/>`;
    out += `<text x="${mx}" y="${my+1}" text-anchor="middle" fill="${color}" font-size="9" font-family="'DungGeunMo',monospace">${lbl}</text>`;
  });

  // 캐릭터들
  chars.forEach(c => {
    const p = pos[c.id];
    if (!p) return;
    const style = CHAR_STYLES[c.id] || {color:'#4a3a6e', hair:'#2a1808', hat:'tophat'};

    // 캐릭터 배경 글로우
    out += `<circle cx="${p.x|0}" cy="${p.y+30}" r="46" fill="${style.color}" opacity="0.12"/>`;
    // 픽셀 플랫폼 (캐릭터 서는 곳)
    out += `<rect x="${(p.x-26)|0}" y="${(p.y+68)|0}" width="54" height="6" fill="${style.color}" opacity="0.4"/>`;
    out += `<rect x="${(p.x-28)|0}" y="${(p.y+72)|0}" width="58" height="4" fill="${style.color}" opacity="0.2"/>`;

    // 픽셀 캐릭터 그리기
    out += pixelChar(p.x, p.y, style.color, style.hair, c.name, style.hat);

    // 이름 라벨 (픽셀 스타일 박스)
    const nameW = c.name.length * 10 + 14;
    out += `<rect x="${(p.x-nameW/2)|0}" y="${(p.y+80)|0}" width="${nameW}" height="20" fill="${style.color}"/>`;
    out += `<rect x="${(p.x-nameW/2)|0}" y="${(p.y+80)|0}" width="${nameW}" height="20" fill="none" stroke="#f0c040" stroke-width="1"/>`;
    out += `<rect x="${(p.x-nameW/2+1)|0}" y="${(p.y+81)|0}" width="${nameW-2}" height="2" fill="#ffffff" opacity="0.2"/>`;
    out += `<text x="${p.x|0}" y="${(p.y+95)|0}" text-anchor="middle" fill="#ffffff" font-size="9" font-family="'DungGeunMo',monospace">${c.name}</text>`;
    // 역할 설명
    out += `<text x="${p.x|0}" y="${(p.y+112)|0}" text-anchor="middle" fill="#c8b8e0" font-size="8" font-family="'DungGeunMo',monospace" opacity="0.8">${c.desc}</text>`;
  });

  // 범례 (픽셀 스타일)
  const LEG = [{c:'#e8507a',l:'사랑',d:''},{c:'#e04020',l:'갈등',d:'8,4'},{c:'#8060c0',l:'관계',d:'6,4'}];
  out += `<rect x="12" y="${H2-48}" width="${W2-24}" height="38" fill="#0a0618"/>`;
  out += `<rect x="12" y="${H2-48}" width="${W2-24}" height="38" fill="none" stroke="#3a2858" stroke-width="1"/>`;
  out += `<text x="${W2/2}" y="${H2-36}" text-anchor="middle" fill="#f0c040" font-size="8" font-family="'DungGeunMo',monospace">— 범 례 —</text>`;
  LEG.forEach((l,i) => {
    const lx = 60 + i*240, ly = H2-22;
    out += `<rect x="${lx}" y="${ly-4}" width="26" height="8" fill="${l.c}" opacity="0.25"/>`;
    out += `<line x1="${lx}" y1="${ly}" x2="${lx+24}" y2="${ly}" stroke="${l.c}" stroke-width="2.5" stroke-dasharray="${l.d}"/>`;
    out += `<circle cx="${lx}" cy="${ly}" r="3" fill="${l.c}"/>`;
    out += `<circle cx="${lx+24}" cy="${ly}" r="3" fill="${l.c}"/>`;
    out += `<text x="${lx+32}" y="${ly+4}" fill="${l.c}" font-size="9" font-family="'DungGeunMo',monospace">${l.l}</text>`;
  });

  svg.innerHTML = out;
}

let currentOpera='onegin', currentSceneKey=0, typingTimer=null, isTyping=false;

function getScene(key){
  const op=OPERAS[currentOpera];
  // 문자열로 넘어온 숫자('4' 등)를 숫자로 변환
  const k = (typeof key==='string' && !isNaN(key)) ? Number(key) : key;
  return typeof k==='number' ? op.scenes[k]||null : op.altScenes[k]||null;
}
function selectOpera(key,btn){
  currentOpera=key;
  document.querySelectorAll('.opera-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function startGame(){
  currentSceneKey=0;
  document.getElementById('title-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('top-opera-name').textContent=OPERAS[currentOpera].name;
  renderRelMap(OPERAS[currentOpera]);
  document.getElementById('rel-title').textContent=OPERAS[currentOpera].name+' 관계도';
  showView('story'); loadScene(0);
}
function loadScene(key){
  currentSceneKey=key;
  const scene=getScene(key);
  if(!scene){showEnd();return;}
  document.getElementById('chapter-badge').textContent=scene.act;
  // Color speaker name by character
  const speakerEl=document.getElementById('speaker-name');
  speakerEl.textContent=scene.speaker;
  const speakerColors={
    '오네긴':'#6090d0','타티야나':'#d06080','렌스키':'#60b060','올가':'#a060c0',
    '보리스':'#d04040','그리고리':'#6090c0','피멘':'#9080a0','마리나':'#c060a0',
    '오데트':'#a0a0e0','지크프리트':'#5080c0','로트바르트':'#c04040','오딜':'#8050a0',
    '나레이터':'#f0c040','캐릭터 소개':'#f0c040',
  };
  speakerEl.style.borderColor=speakerColors[scene.speaker]||'var(--gold)';
  speakerEl.style.color=speakerColors[scene.speaker]||'var(--gold)';
  const total=OPERAS[currentOpera].scenes.length;
  const pct=typeof key==='number'?Math.max(5,Math.round((key/(total-1))*100)):50;
  document.getElementById('progress-bar').style.width=pct+'%';
  const renderer=BG[scene.bg]||BG.country;
  const scenesvg=document.getElementById('scene-svg');
  renderer(scenesvg);
  addSceneOverlay(scenesvg, scene.bg, scene.act);
  const ic=document.getElementById('info-container');
  ic.innerHTML=scene.info?`<div class="info-panel"><div class="info-label">${scene.info.label}</div><div class="info-text">${scene.info.text.replace(/\n/g,'<br>')}</div></div>`:'';
  typeText(scene.text,()=>{renderUI(scene,key);});
}
function typeText(text,onDone){
  if(typingTimer){clearInterval(typingTimer);typingTimer=null;}
  isTyping=true;
  const el=document.getElementById('dialogue-text');
  const lines=text.split('\n');
  let li=0,ci=0;
  document.getElementById('choices').style.display='none';
  document.getElementById('nav-row').style.display='none';
  el.innerHTML='';
  typingTimer=setInterval(()=>{
    if(li>=lines.length){
      clearInterval(typingTimer);typingTimer=null;isTyping=false;
      el.innerHTML=lines.map(l=>`<span>${l}</span>`).join('<br>');
      if(onDone)onDone(); return;
    }
    const line=lines[li];
    if(ci<=line.length){
      el.innerHTML=lines.slice(0,li).map(l=>`<span>${l}</span>`).join('<br>')+(li>0?'<br>':'')+`<span>${line.substring(0,ci)}<span class="cursor-blink"> </span></span>`;
      ci++;
    } else {li++;ci=0;}
  },28);
}
function skipTyping(){
  if(!isTyping)return false;
  clearInterval(typingTimer);typingTimer=null;isTyping=false;
  const scene=getScene(currentSceneKey);
  if(scene){
    document.getElementById('dialogue-text').innerHTML=scene.text.split('\n').map(l=>`<span>${l}</span>`).join('<br>');
    renderUI(scene,currentSceneKey);
  }
  return true;
}
function renderUI(scene,key){
  const choices=document.getElementById('choices'), navRow=document.getElementById('nav-row');
  if(scene.choices&&scene.choices.length){
    choices.innerHTML=scene.choices.map(c=>{
      const arg = typeof c.next==='number' ? c.next : `'${c.next}'`;
      return `<button class="choice-btn" onclick="makeChoice(${arg})">${c.text}</button>`;
    }).join('');
    choices.style.display='flex'; navRow.style.display='none';
  } else if(scene.isEnd){
    choices.style.display='none';
    navRow.innerHTML=`<button class="nav-btn" onclick="showEnd()">피날레 ▶</button>`;
    navRow.style.display='flex';
  } else {
    choices.style.display='none';
    navRow.innerHTML=`<button class="nav-btn" onclick="nextScene()">다음 ▶</button>`;
    navRow.style.display='flex';
  }
}
function makeChoice(next){loadScene(next);}
function nextScene(){
  if(skipTyping())return;
  // altScenes always have choices, so nextScene should only be called from numbered scenes
  if(typeof currentSceneKey==='number'){
    loadScene(currentSceneKey+1);
  }
  // If somehow called from altScene, do nothing (altScenes use choices)
}
function showEnd(){
  const op=OPERAS[currentOpera];
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('end-title').innerHTML=op.endTitle.replace(/\n/g,'<br>');
  document.getElementById('end-text').innerHTML=op.endText.replace(/\n/g,'<br>');
}
function backToTitle(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('title-screen').style.display='flex';
}
function restartCurrent(){document.getElementById('end-screen').style.display='none';startGame();}
function showView(v){
  document.getElementById('story-view').style.display=v==='story'?'block':'none';
  document.getElementById('rel-view').style.display=v==='rel'?'block':'none';
  document.getElementById('btn-story').classList.toggle('active',v==='story');
  document.getElementById('btn-rel').classList.toggle('active',v==='rel');
}
